name: Autoblog Generator

on:
  schedule:
    # Runs every day at 00:00 UTC (09:00 KST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Autoblog Script
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        KAKAO_EMAIL: ${{ secrets.KAKAO_EMAIL }}
        KAKAO_PASSWORD: ${{ secrets.KAKAO_PASSWORD }}
        TISTORY_COOKIES: ${{ secrets.TISTORY_COOKIES }}
      run: |
        python scripts/autoblog.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add posts/
        git commit -m "Auto-post generated by GitHub Actions" || echo "No changes to commit"
        git push
